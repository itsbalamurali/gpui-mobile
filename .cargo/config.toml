# Cargo configuration for gpui-mobile
#
# This file configures cross-compilation for Android targets.
# The RUST_FONTCONFIG_DLOPEN=on env var prevents yeslogic-fontconfig-sys
# from trying to link fontconfig at build time (which fails on Android).

[env]
# Enable dlopen-based fontconfig loading so the build doesn't fail
# when cross-compiling for Android (fontconfig is not available).
RUST_FONTCONFIG_DLOPEN = "on"

# ── Android NDK linker configuration ─────────────────────────────────────────
#
# These use the NDK clang as the linker for each Android target.
# Adjust the NDK path if yours differs from the default Android Studio location.
#
# If you use cargo-ndk, these are set automatically and can be left commented.
# Uncomment and adjust if building without cargo-ndk.

